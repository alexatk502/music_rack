name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # NB: wasm-pack resolves a relative --out-dir relative to the CRATE, not
      # the workspace, so it must be absolute to land in the top-level web/.
      - name: Build worklet (DSP engine) wasm
        run: wasm-pack build crates/worklet --target web --out-dir "$GITHUB_WORKSPACE/web/worklet" --no-typescript

      - name: Build app (UI) wasm
        run: wasm-pack build crates/app --target web --out-dir "$GITHUB_WORKSPACE/web/app" --no-typescript

      - name: Make the synth the site landing page
        run: |
          cp web/app.html web/index.html
          touch web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
